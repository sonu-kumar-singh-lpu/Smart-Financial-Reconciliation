apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: financial-reconciliation-hpa
  namespace: financial-app
  labels:
    app: financial-reconciliation
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: financial-reconciliation
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80