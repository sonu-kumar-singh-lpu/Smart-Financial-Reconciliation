apiVersion: apps/v1
kind: Deployment
metadata:
  name: financial-reconciliation
  namespace: financial-app
  labels:
    app: financial-reconciliation
spec:
  replicas: 2
  selector:
    matchLabels:
      app: financial-reconciliation
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: financial-reconciliation
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: financial-reconciliation
          image: financial-reconciliation:latest
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8501
          envFrom:
            - configMapRef:
                name: financial-reconciliation-config
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      restartPolicy: Always